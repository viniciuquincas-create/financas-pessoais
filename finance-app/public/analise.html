<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080810"/>
  <title>Análise Financeira · Vinicius</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Sora',sans-serif;background:#080810;color:#e8e8f0;min-height:100vh;padding-bottom:48px}
    .mono{font-family:'JetBrains Mono',monospace}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu .4s ease forwards}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;margin-bottom:12px}
    .spinner{width:40px;height:40px;border-radius:50%;border:2px solid rgba(124,106,247,.15);border-top:2px solid #7c6af7;animation:spin 1s linear infinite;margin:0 auto 16px}
    button{font-family:'Sora',sans-serif;cursor:pointer}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#222}
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header" style="background:linear-gradient(135deg,rgba(124,106,247,.12),rgba(0,180,150,.06));border-bottom:1px solid rgba(255,255,255,.06);padding:22px 20px 18px;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)">
  <div style="max-width:520px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px">Análise Financeira · IA</div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-.5px">Vinicius — Finanças</div>
      <div id="updated" style="font-size:10px;color:#333;margin-top:3px"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="/" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 12px;color:#555;font-size:11px;font-weight:600;text-decoration:none">← App</a>
      <button id="btnAtualizar" onclick="runAnalysis()" style="background:rgba(124,106,247,.2);border:1px solid rgba(124,106,247,.3);border-radius:10px;padding:7px 14px;color:#a89cf7;font-size:12px;font-weight:600">↻ Atualizar</button>
    </div>
  </div>
</div>

<!-- CONTEÚDO -->
<div style="max-width:520px;margin:0 auto;padding:16px" id="content">
  <div style="text-align:center;padding:80px 0" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#555">Buscando dados e analisando...</div>
    <div style="font-size:11px;color:#333;margin-top:6px">Supabase → Claude → resultado</div>
  </div>
</div>

<script>
const fmtBRL = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const mesLabel = k => { const[y,m]=k.split("-"); return `${MESES[+m-1]}/${String(y).slice(-2)}`; };
const sc = s => s>=75?"#4ade80":s>=50?"#fbbf24":s>=30?"#f97316":"#f87171";
const ti = t => t==="melhorando"?"↑":t==="piorando"?"↓":"→";
const tc = t => t==="melhorando"?"#4ade80":t==="piorando"?"#f87171":"#fbbf24";

async function runAnalysis() {
  const btn = document.getElementById("btnAtualizar");
  btn.disabled = true; btn.textContent = "...";
  document.getElementById("content").innerHTML = `
    <div style="text-align:center;padding:80px 0">
      <div class="spinner"></div>
      <div style="font-size:13px;color:#555">Analisando suas finanças...</div>
      <div style="font-size:11px;color:#333;margin-top:6px">Pode levar até 10 segundos</div>
    </div>`;

  try {
    const res = await fetch("/api/analise");
    if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResult(data);
    document.getElementById("updated").textContent =
      "Atualizado às " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  } catch(e) {
    document.getElementById("content").innerHTML = `
      <div class="card fu" style="border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04);text-align:center;padding:32px">
        <div style="font-size:28px;margin-bottom:10px">⚠️</div>
        <div style="font-size:13px;color:#f87171;margin-bottom:16px;line-height:1.6">${e.message}</div>
        <button onclick="runAnalysis()" style="background:#7c6af7;border:none;border-radius:10px;padding:10px 24px;color:#fff;font-size:13px;font-weight:600">Tentar novamente</button>
      </div>`;
  } finally {
    btn.disabled = false; btn.textContent = "↻ Atualizar";
  }
}

function renderResult(data) {
  const { analysis, nums, meses, saldos } = data;
  let html = "";

  // Score
  html += `
  <div class="card fu" style="background:linear-gradient(135deg,rgba(124,106,247,.08),transparent);border-color:rgba(124,106,247,.18)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Saúde Financeira · ${mesLabel(data.curKey)}</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="mono" style="font-size:52px;font-weight:700;color:${sc(analysis.score)};line-height:1">${analysis.score}</span>
          <span style="font-size:13px;color:#444">/100</span>
        </div>
        <div style="display:inline-block;margin-top:8px;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;background:${sc(analysis.score)}18;color:${sc(analysis.score)};border:1px solid ${sc(analysis.score)}33">${analysis.scoreLabel}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#444;margin-bottom:6px">Tendência</div>
        <div style="font-size:36px;color:${tc(analysis.tendencia)};font-weight:700;line-height:1">${ti(analysis.tendencia)}</div>
        <div style="font-size:11px;color:${tc(analysis.tendencia)};margin-top:4px">${analysis.tendencia}</div>
      </div>
    </div>
    <div style="height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-bottom:14px">
      <div style="height:100%;width:${analysis.score}%;background:linear-gradient(90deg,#f87171,${sc(analysis.score)});border-radius:3px"></div>
    </div>
    <div style="font-size:13px;color:#888;line-height:1.75">${analysis.resumo}</div>
  </div>`;

  // Resumo do mês
  html += `
  <div class="card fu">
    <div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Resumo do mês</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
      ${[["Receita",nums.rec,"#4ade80"],["Despesas",nums.desp,"#f87171"],["Saldo",nums.saldo,nums.saldo>=0?"#4ade80":"#f87171"]].map(([l,v,c])=>`
        <div style="text-align:center;background:rgba(255,255,255,.03);border-radius:10px;padding:10px 4px">
          <div style="font-size:9px;color:#444;text-transform:uppercase;margin-bottom:3px">${l}</div>
          <div class="mono" style="font-size:13px;font-weight:700;color:${c}">${fmtBRL(v)}</div>
        </div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${[["Fixas",nums.fixas,"#818cf8"],["Cartões",nums.cartoes,"#f97316"],["Variáveis",nums.variaveis,"#22d3ee"],["Investido",nums.investido,"#a78bfa"]].map(([l,v,c])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.02);border-radius:8px">
          <span style="font-size:11px;color:#444">${l}</span>
          <span class="mono" style="font-size:11px;color:${c};font-weight:600">${fmtBRL(v)}</span>
        </div>`).join("")}
    </div>
  </div>`;

  // Histórico
  if (saldos && saldos.length > 1) {
    const maxA = Math.max(...saldos.map(s=>Math.abs(s.saldo)), 1);
    html += `
    <div class="card fu">
      <div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Saldo — histórico</div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:72px">
        ${saldos.map(({k,saldo},i)=>{
          const h = Math.max(Math.abs(saldo)/maxA*58, 2);
          const isP = saldo>=0, isC = i===saldos.length-1;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            ${isC?`<div class="mono" style="font-size:8px;color:${isP?"#4ade80":"#f87171"};white-space:nowrap">${fmtBRL(saldo)}</div>`:""}
            <div style="width:70%;height:${h}px;background:${isP?"#4ade80":"#f87171"};border-radius:3px 3px 0 0;opacity:${isC?1:.3}"></div>
            <div style="font-size:8px;color:${isC?"#f0f0f5":"#2a2a35"};font-weight:${isC?700:400}">${mesLabel(k)}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }

  // Alertas
  if (analysis.alertas?.length) {
    html += `<div class="card fu" style="border-color:rgba(239,68,68,.18);background:rgba(239,68,68,.03)">
      <div style="font-size:10px;color:#f87171;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">⚠ Alertas</div>
      ${analysis.alertas.map(a=>`
        <div style="display:flex;gap:10px;padding:10px 12px;background:rgba(239,68,68,.06);border-radius:10px;border-left:3px solid rgba(239,68,68,.35);margin-bottom:6px">
          <div style="color:#f87171;flex-shrink:0;margin-top:2px">!</div>
          <div style="font-size:13px;color:#ccc;line-height:1.6">${a}</div>
        </div>`).join("")}
    </div>`;
  }

  // Positivos
  if (analysis.positivos?.length) {
    html += `<div class="card fu" style="border-color:rgba(74,222,128,.18);background:rgba(74,222,128,.03)">
      <div style="font-size:10px;color:#4ade80;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">✓ Pontos positivos</div>
      ${analysis.positivos.map(p=>`
        <div style="display:flex;gap:10px;padding:10px 12px;background:rgba(74,222,128,.06);border-radius:10px;border-left:3px solid rgba(74,222,128,.35);margin-bottom:6px">
          <div style="color:#4ade80;flex-shrink:0;margin-top:2px">✓</div>
          <div style="font-size:13px;color:#ccc;line-height:1.6">${p}</div>
        </div>`).join("")}
    </div>`;
  }

  // Ações
  if (analysis.acoes?.length) {
    html += `<div class="card fu">
      <div style="font-size:10px;color:#a89cf7;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">→ Ações prioritárias</div>
      ${analysis.acoes.map((a,i)=>`
        <div style="display:flex;gap:12px;padding:10px 12px;background:rgba(124,106,247,.06);border-radius:10px;border-left:3px solid rgba(124,106,247,.35);margin-bottom:6px">
          <div class="mono" style="font-size:10px;color:#a89cf7;background:rgba(124,106,247,.15);border-radius:6px;padding:2px 7px;flex-shrink:0;align-self:flex-start;margin-top:1px">${i+1}</div>
          <div style="font-size:13px;color:#ccc;line-height:1.6">${a}</div>
        </div>`).join("")}
    </div>`;
  }

  // Plantões
  if (analysis.comentario_plantoes) {
    html += `<div class="card fu">
      <div style="font-size:10px;color:#22d3ee;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px">📅 Plantões</div>
      <div style="font-size:13px;color:#999;line-height:1.75">${analysis.comentario_plantoes}</div>
    </div>`;
  }

  // Fixas
  if (analysis.comentario_fixas) {
    html += `<div class="card fu">
      <div style="font-size:10px;color:#fbbf24;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px">📋 Despesas fixas</div>
      <div style="font-size:13px;color:#999;line-height:1.75">${analysis.comentario_fixas}</div>
    </div>`;
  }

  html += `<div style="text-align:center;font-size:10px;color:#1e1e28;margin-top:4px">${meses.length} mês(es) · Supabase → Claude · automático</div>`;

  document.getElementById("content").innerHTML = html;
}

// Roda ao carregar
runAnalysis();
</script>
</body>
</html>
